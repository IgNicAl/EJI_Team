services:
  # -----------------------------------------------------
  # 1. FRONTEND (React/Vite + Nginx Secure)
  # -----------------------------------------------------
  prontu-ai:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
        VITE_N8N_BASE_URL: ${VITE_N8N_BASE_URL}
    env_file:
      - .env.local
    container_name: prontu-ai
    ports:
      - "3000:8080"
    restart: unless-stopped
    
    # ── Security Context (Best Practices) ──
    # Impede gravação no sistema de arquivos local
    read_only: true
    security_opt:
      - no-new-privileges:true
    # Remove todas as capabilities de root
    cap_drop:
      - ALL
    # Diretório necessário para o funcionamento interno do nginx
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/log/nginx
    
    # Validação contínua do estado do container
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

# -----------------------------------------------------
# NETWORKS (Infraestrutura Lógica)
# -----------------------------------------------------
networks:
  default:
    driver: bridge
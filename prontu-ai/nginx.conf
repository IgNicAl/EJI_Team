server {
    # ── ALTERAÇÃO CRÍTICA: Escutar numa porta não privilegiada ──
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip Compression ─────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 256;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ── Security Headers ─────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Hashed Assets (Vite generates unique hashes) ──
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # ── Static Files ─────────────────────────────
    location ~* \.(ico|svg|png|jpg|jpeg|gif|webp|woff|woff2|ttf|otf)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # ── SPA Fallback (React Router) ──────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}